<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 320 640" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="phoneFrame" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#2C3E50"/>
            <stop offset="100%" style="stop-color:#34495E"/>
        </linearGradient>
        <filter id="phoneShadow">
            <feDropShadow dx="0" dy="20" stdDeviation="20" flood-opacity="0.3"/>
        </filter>
        <filter id="innerShadow">
            <feOffset dx="0" dy="2"/>
            <feGaussianBlur stdDeviation="2" result="offset-blur"/>
            <feFlood flood-color="#FFFFFF" flood-opacity="0.1"/>
            <feComposite in2="offset-blur" operator="in"/>
        </filter>
    </defs>
    
    <!-- Phone frame -->
    <rect x="0" y="0" width="320" height="640" rx="40" 
          fill="url(#phoneFrame)" filter="url(#phoneShadow)"/>
    
    <!-- Inner frame highlight -->
    <rect x="2" y="2" width="316" height="636" rx="38" 
          fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="2"/>
    
    <!-- Screen area -->
    <rect x="20" y="20" width="280" height="600" rx="30" 
          fill="#FFFFFF" stroke="rgba(0,0,0,0.1)" stroke-width="1"/>
    
    <!-- Status bar area -->
    <rect x="20" y="20" width="280" height="30" rx="30" 
          fill="#FF3B47" opacity="0.9"/>
    
    <!-- Home indicator (modern phones) -->
    <rect x="140" y="610" width="40" height="4" rx="2" 
          fill="rgba(255,255,255,0.3)"/>
    
    <!-- Speaker -->
    <ellipse cx="160" cy="35" rx="25" ry="3" fill="rgba(0,0,0,0.2)"/>
    
    <!-- Camera -->
    <circle cx="200" cy="35" r="4" fill="rgba(0,0,0,0.4)"/>
    <circle cx="200" cy="35" r="2" fill="rgba(0,0,0,0.8)"/>
</svg>