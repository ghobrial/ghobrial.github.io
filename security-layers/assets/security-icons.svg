<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 400 100" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <!-- Gradients for each security layer -->
        <linearGradient id="kernelGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#009500"/>
            <stop offset="100%" style="stop-color:#007A00"/>
        </linearGradient>
        <linearGradient id="halGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#0077e4"/>
            <stop offset="100%" style="stop-color:#0056B3"/>
        </linearGradient>
        <linearGradient id="runtimeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#7e00e8"/>
            <stop offset="100%" style="stop-color:#5D00A8"/>
        </linearGradient>
        <linearGradient id="appGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#c80035"/>
            <stop offset="100%" style="stop-color:#A0002A"/>
        </linearGradient>
        <filter id="iconShadow">
            <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.3"/>
        </filter>
    </defs>
    
    <!-- Kernel Security Icon (Shield) -->
    <g id="kernel-icon" transform="translate(25, 25)">
        <path d="M25 5 L40 15 L40 35 Q40 45 25 50 Q10 45 10 35 L10 15 Z" 
              fill="url(#kernelGrad)" filter="url(#iconShadow)"/>
        <path d="M25 12 L32 18 L32 32 Q32 38 25 42 Q18 38 18 32 L18 18 Z" 
              fill="rgba(255,255,255,0.3)"/>
        <circle cx="25" cy="28" r="3" fill="#FFFFFF"/>
    </g>
    
    <!-- HAL Security Icon (Lock) -->
    <g id="hal-icon" transform="translate(125, 25)">
        <rect x="15" y="25" width="20" height="20" rx="3" 
              fill="url(#halGrad)" filter="url(#iconShadow)"/>
        <path d="M20 25 L20 20 Q20 15 25 15 Q30 15 30 20 L30 25" 
              fill="none" stroke="url(#halGrad)" stroke-width="3"/>
        <circle cx="25" cy="35" r="2" fill="#FFFFFF"/>
        <rect x="24" y="37" width="2" height="5" fill="#FFFFFF"/>
    </g>
    
    <!-- Runtime Security Icon (Lightning) -->
    <g id="runtime-icon" transform="translate(225, 25)">
        <path d="M30 10 L20 25 L25 25 L20 40 L30 25 L25 25 Z" 
              fill="url(#runtimeGrad)" filter="url(#iconShadow)"/>
        <path d="M28 12 L22 23 L24 23 L22 35 L28 23 L26 23 Z" 
              fill="rgba(255,255,255,0.4)"/>
    </g>
    
    <!-- App Security Icon (Mobile Phone) -->
    <g id="app-icon" transform="translate(325, 25)">
        <rect x="18" y="10" width="14" height="30" rx="3" 
              fill="url(#appGrad)" filter="url(#iconShadow)"/>
        <rect x="20" y="14" width="10" height="18" rx="1" 
              fill="rgba(255,255,255,0.9)"/>
        <circle cx="25" cy="36" r="2" fill="rgba(255,255,255,0.8)"/>
        <rect x="22" y="12" width="6" height="1" rx="0.5" 
              fill="rgba(255,255,255,0.6)"/>
    </g>
</svg>