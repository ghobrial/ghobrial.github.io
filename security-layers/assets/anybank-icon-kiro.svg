<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="iconBackground" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#FF3B47"/>
            <stop offset="100%" style="stop-color:#E6353F"/>
        </linearGradient>
        <linearGradient id="moneyBag" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#FFD700"/>
            <stop offset="100%" style="stop-color:#DAA520"/>
        </linearGradient>
        <filter id="dropShadow">
            <feDropShadow dx="0" dy="4" stdDeviation="4" flood-opacity="0.2"/>
        </filter>
    </defs>
    
    <!-- App icon background -->
    <rect width="120" height="120" rx="24" fill="url(#iconBackground)" filter="url(#dropShadow)"/>
    
    <!-- Money bag shape -->
    <path d="M35 45 Q35 35 45 35 L75 35 Q85 35 85 45 L85 85 Q85 95 75 95 L45 95 Q35 95 35 85 Z" 
          fill="url(#moneyBag)" stroke="#B8860B" stroke-width="1"/>
    
    <!-- Money bag tie -->
    <ellipse cx="60" cy="40" rx="8" ry="4" fill="#B8860B"/>
    <rect x="58" y="35" width="4" height="8" fill="#8B4513"/>
    
    <!-- Dollar sign -->
    <text x="60" y="75" font-family="Arial Black" font-size="24" 
          text-anchor="middle" fill="#2C3E50">$</text>
</svg>